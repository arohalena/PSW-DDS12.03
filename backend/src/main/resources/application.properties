spring.application.name=backend

spring.config.import=optional:file:../.env

spring.datasource.url=jdbc:postgresql://${POSTGRE_HOST:aws-0-eu-west-1.pooler.supabase.com}:${POSTGRE_PORT:5432}/${POSTGRES_DB:postgres}?sslmode=require
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

admin.email=${ADMIN_EMAIL:admin@votify.com}
admin.password=${ADMIN_PASSWORD:admin123}
admin.nombre=${ADMIN_NOMBRE:admin}

spring.jpa.hibernate.ddl-auto=validate
spring.jackson.default-property-inclusion=always

server.error.include-message=always

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}