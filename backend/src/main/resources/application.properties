spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/Votify
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}


# --- JPA/Hibernate: per forzare la creazione delle tabelle al prossimo avvio ---
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (opzionale ma utile) specifica schema
spring.jpa.properties.hibernate.default_schema=public

# (opzionale) log più verboso per capire cosa fa Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

