services:
  db:
    image: postgres:16
    container_name: votify_bd
    environment:
      POSTGRES_DB: VotifyPrototipo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22.15.0-alpine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_started

  backend:
    image: votify-back:0.0.1
    ports:
      - "8090:8090"
      - "8000:8000"
    environment:
      - POSTGRE_HOST=db
      - POSTGRE_PORT=5432
      - POSTGRES_DB=VotifyPrototipo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: